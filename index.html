<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Listrik MQTT</title>
  <script src="https://unpkg.com/paho-mqtt/mqttws31.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f5f5f5;
    }
    h2 { color: #333; }
    .data-box {
      display: inline-block;
      background: white;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
      min-width: 150px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Dashboard Listrik MQTT</h2>

<div class="data-box">Voltage: <span id="voltage">-</span> V</div>
<div class="data-box">Current: <span id="current">-</span> A</div>
<div class="data-box">Power: <span id="power">-</span> W</div>
<div class="data-box">Energy: <span id="energy">-</span> kWh</div>
<div class="data-box">Frequency: <span id="frequency">-</span> Hz</div>
<div class="data-box">Power Factor: <span id="pf">-</span></div>

<div>
  <button onclick="kirim('ON')">Nyalakan</button>
  <button onclick="kirim('OFF')">Matikan</button>
</div>

<script>
  // ===== GANTI DATA HONEYMQ =====
  const host = "3f9763aac9624358808fabe983c3d83c.s1.eu.hivemq.cloud:8884/mqtt"; // host HiveMQ Cloud
  const port = 8884;   // WebSocket TLS
  const username = "Cekitet23";  // user HiveMQ
  const password = "Matahariku23"; // password HiveMQ

  const client = new Paho.MQTT.Client(host, port, "/mqtt", "dashboard-" + Math.random());

  client.onConnectionLost = function(responseObject) {
      console.log("Koneksi terputus", responseObject.errorMessage);
      document.getElementById("voltage").innerText = "-";
      document.getElementById("current").innerText = "-";
      document.getElementById("power").innerText = "-";
      document.getElementById("energy").innerText = "-";
      document.getElementById("frequency").innerText = "-";
      document.getElementById("pf").innerText = "-";
  };

  client.onMessageArrived = function(message) {
      const topic = message.destinationName;
      const value = message.payloadString;

      switch(topic){
        case "Voltage210534615623": document.getElementById("voltage").innerText = value; break;
        case "Current210534615623": document.getElementById("current").innerText = value; break;
        case "Power210534615623": document.getElementById("power").innerText = value; break;
        case "Energy210534615623": document.getElementById("energy").innerText = value; break;
        case "Frequensi210534615623": document.getElementById("frequency").innerText = value; break;
        case "Powerfactor210534615623": document.getElementById("pf").innerText = value; break;
      }
  };

  client.connect({
      useSSL: true,
      userName: username,
      password: password,
      onSuccess: function() {
          console.log("Terhubung ke HiveMQ Cloud");
          // Subscribe semua topic ESP32
          client.subscribe("Voltage210534615623");
          client.subscribe("Current210534615623");
          client.subscribe("Power210534615623");
          client.subscribe("Energy210534615623");
          client.subscribe("Frequensi210534615623");
          client.subscribe("Powerfactor210534615623");
      },
      onFailure: function(e) {
          alert("Gagal koneksi MQTT: " + e.errorMessage);
      }
  });

  function kirim(pesan) {
      const msg = new Paho.MQTT.Message(pesan);
      msg.destinationName = "lamp/control";
      client.send(msg);
      console.log("Mengirim:", pesan);
  }
</script>

</body>
</html>
